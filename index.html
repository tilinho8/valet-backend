<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Valet Scanner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background:#08080f; color:#eeeef5; font-family:'DM Mono','Courier New',monospace; min-height:100vh; }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

header { background:#10101a; border-bottom:1px solid #1e1e2e; padding:15px 22px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:50; }
.logo { width:36px; height:36px; background:linear-gradient(135deg,#f5a623,#e0820a); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow:0 0 18px #f5a62335; flex-shrink:0; }
.header-title { font-size:14px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; }
.header-sub { font-size:10px; color:#555570; letter-spacing:0.12em; text-transform:uppercase; }
.badge { background:#f5a62316; border:1px solid #f5a62340; border-radius:20px; padding:4px 13px; font-size:11px; color:#f5a623; margin-left:auto; }

main { max-width:540px; margin:0 auto; padding:26px 18px 80px; }

.status { padding:11px 15px; border-radius:10px; margin-bottom:18px; font-size:12px; display:flex; align-items:center; gap:8px; animation:up 0.2s ease; word-break:break-word; }
.status.err { background:#ef444418; border:1px solid #ef444455; color:#ef4444; }
.status.ok { background:#22c55e18; border:1px solid #22c55e55; color:#22c55e; }

.card { background:#10101a; border:1px solid #1e1e2e; border-radius:16px; overflow:hidden; margin-bottom:22px; }
.card-inner { padding:20px 20px 0; }
.section-label { font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:#444460; margin-bottom:14px; }

.drop-zone { border:2px dashed #242436; border-radius:12px; padding:36px 20px; display:flex; flex-direction:column; align-items:center; gap:10px; cursor:pointer; transition:all 0.2s; position:relative; text-align:center; }
.drop-zone.drag { border-color:#f5a623; background:#f5a62308; }
.drop-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.drop-icon { font-size:32px; }
.drop-text { font-size:13px; color:#8888a0; line-height:1.6; }
.drop-accent { color:#f5a623; font-weight:600; }

.preview-wrap { position:relative; }
.preview-wrap img { width:100%; border-radius:10px; display:block; max-height:340px; object-fit:contain; background:#000; }
.clear-btn { position:absolute; top:8px; right:8px; width:30px; height:30px; border-radius:50%; background:#000c; border:1px solid #fff2; color:#fff; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

.divider { display:flex; align-items:center; gap:12px; margin:14px 0; }
.divider-line { flex:1; height:1px; background:#1a1a28; }
.divider-text { font-size:10px; color:#2a2a40; letter-spacing:0.14em; text-transform:uppercase; }

.cam-btn { width:100%; padding:12px; background:transparent; border:1px solid #242436; border-radius:10px; color:#7777a0; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; font-family:inherit; transition:all 0.2s; }
.cam-btn.active { background:#f5a62318; border-color:#f5a62388; color:#f5a623; }

.video-wrap { position:relative; margin-top:12px; border-radius:10px; overflow:hidden; background:#000; }
video { width:100%; display:block; max-height:280px; object-fit:cover; }
.capture-btn { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); width:56px; height:56px; border-radius:50%; background:#f5a623; border:4px solid #fff3; cursor:pointer; font-size:22px; box-shadow:0 0 24px #f5a62360; display:flex; align-items:center; justify-content:center; }

.card-bottom { padding:16px 20px 20px; }
.scan-btn { width:100%; padding:14px; background:#1a1a28; border:none; border-radius:10px; color:#444460; font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; cursor:not-allowed; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; }
.scan-btn.ready { background:linear-gradient(135deg,#f5a623,#e0820a); color:#000; cursor:pointer; box-shadow:0 4px 18px #f5a62338; }

.spinner { display:inline-block; width:13px; height:13px; border:2px solid #33334a; border-top-color:#f5a623; border-radius:50%; animation:spin 0.7s linear infinite; }

.form-card { background:#10101a; border:1px solid #1e1e2e; border-radius:16px; padding:20px; margin-bottom:22px; animation:up 0.3s ease; }
.form-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.ticket-num { font-size:13px; color:#f5a623; font-weight:700; }
.field-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.field-full { grid-column:1/-1; }
.field-label { font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:#444460; margin-bottom:5px; }
input, select { width:100%; background:#08080f; border:1px solid #252535; border-radius:8px; padding:10px 11px; color:#eeeef5; font-size:13px; font-family:inherit; outline:none; appearance:none; }
input:focus, select:focus { border-color:#f5a623; box-shadow:0 0 0 3px #f5a62318; }
select option { background:#0d0d18; }
.form-actions { display:flex; gap:10px; margin-top:18px; }
.btn-discard { padding:12px 16px; background:transparent; border:1px solid #252535; border-radius:10px; color:#555570; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; font-family:inherit; }
.btn-save { flex:1; padding:12px; background:linear-gradient(135deg,#f5a623,#e0820a); border:none; border-radius:10px; color:#000; font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; font-family:inherit; box-shadow:0 4px 16px #f5a62335; }

.log-card { background:#10101a; border:1px solid #1e1e2e; border-radius:16px; overflow:hidden; animation:up 0.3s ease; }
.log-header { padding:14px 20px; border-bottom:1px solid #181828; display:flex; align-items:center; justify-content:space-between; }
.export-btn { padding:5px 13px; background:transparent; border:1px solid #252535; border-radius:20px; color:#7777a0; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; font-family:inherit; }
.filter-bar { padding:10px 20px; border-bottom:1px solid #181828; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.filter-select { background:#08080f; border:1px solid #252535; border-radius:8px; padding:7px 10px; color:#eeeef5; font-size:11px; font-family:inherit; outline:none; appearance:none; cursor:pointer; flex:1; min-width:120px; }
.filter-select:focus { border-color:#f5a623; }
.filter-reset { padding:7px 12px; background:transparent; border:1px solid #252535; border-radius:8px; color:#555570; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; font-family:inherit; white-space:nowrap; }
.search-wrap { padding:12px 20px; border-bottom:1px solid #181828; }
.search-input { width:100%; background:#08080f; border:1px solid #252535; border-radius:8px; padding:9px 12px; color:#eeeef5; font-size:12px; font-family:inherit; outline:none; appearance:none; }
.search-input:focus { border-color:#f5a623; box-shadow:0 0 0 3px #f5a62318; }
.ticket-row { padding:13px 20px; border-bottom:1px solid #121220; display:flex; align-items:center; gap:12px; cursor:pointer; transition:background 0.15s; }
.ticket-row:hover { background:#14141e; }
.ticket-num-col { font-size:11px; color:#f5a623; font-weight:700; min-width:64px; flex-shrink:0; }
.ticket-info { flex:1; min-width:0; }
.ticket-main { font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ticket-sub { font-size:10px; color:#444460; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.color-dot { width:10px; height:10px; border-radius:50%; border:1px solid #fff2; flex-shrink:0; }
.del-btn { width:26px; height:26px; border-radius:6px; background:transparent; border:1px solid #252535; color:#444460; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

.modal-overlay { display:none; position:fixed; inset:0; background:#000a; z-index:100; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal { background:#10101a; border:1px solid #1e1e2e; border-radius:16px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto; animation:up 0.25s ease; }
.modal-header { padding:16px 20px; border-bottom:1px solid #1e1e2e; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:#10101a; z-index:10; }
.modal-title { font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#f5a623; font-weight:700; }
.modal-close { width:30px; height:30px; border-radius:50%; background:transparent; border:1px solid #252535; color:#eeeef5; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.modal-body { padding:20px; }
.modal-actions { display:flex; gap:10px; padding:0 20px 20px; }
</style>
</head>

<script>
const COLOR_MAP = {Black:"#1a1a1a",White:"#ebebeb",Silver:"#c0c0c0",Gray:"#888",Red:"#cc3322",Blue:"#2266ee",Green:"#229944",Gold:"#ccaa00",Beige:"#c9b89a",Brown:"#8b5e3c",Orange:"#ff7700",Yellow:"#ffdd00",Purple:"#9933ff",Other:"#555"};
let imgBase64 = null;
let stream = null;
let tickets = [];
let modalIndex = -1;

function showStatus(msg, type) {
  const w = document.getElementById("status-wrap");
  w.innerHTML = `<div class="status ${type}">${type==="err"?"⚠":"✓"} ${msg}</div>`;
  if (type === "ok") setTimeout(() => w.innerHTML = "", 3000);
}
function clearStatus() { document.getElementById("status-wrap").innerHTML = ""; }

document.getElementById("file-input").addEventListener("change", e => loadFile(e.target.files[0]));
const dz = document.getElementById("drop-zone");
dz.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("drag"); });
dz.addEventListener("dragleave", () => dz.classList.remove("drag"));
dz.addEventListener("drop", e => { e.preventDefault(); dz.classList.remove("drag"); loadFile(e.dataTransfer.files[0]); });

function loadFile(file) {
  if (!file || !file.type.startsWith("image/")) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const compressed = await compressImage(e.target.result);
    imgBase64 = compressed;
    document.getElementById("preview-img").src = "data:image/jpeg;base64," + compressed;
    document.getElementById("upload-area").style.display = "none";
    document.getElementById("preview-area").style.display = "block";
    document.getElementById("cam-divider").style.display = "none";
    document.getElementById("cam-btn").style.display = "none";
    document.getElementById("scan-btn").className = "scan-btn ready";
    clearStatus();
  };
  reader.readAsDataURL(file);
}

function compressImage(dataUrl, maxW=1600) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const c = document.createElement("canvas");
      c.width = img.width * scale; c.height = img.height * scale;
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL("image/jpeg", 0.82).split(",")[1]);
    };
    img.src = dataUrl;
  });
}

function clearImage() {
  imgBase64 = null;
  document.getElementById("upload-area").style.display = "block";
  document.getElementById("preview-area").style.display = "none";
  document.getElementById("cam-divider").style.display = "flex";
  document.getElementById("cam-btn").style.display = "flex";
  document.getElementById("scan-btn").className = "scan-btn";
  document.getElementById("form-card").style.display = "none";
  document.getElementById("file-input").value = "";
  clearStatus();
}

async function toggleCamera() {
  if (stream) { stopCamera(); return; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    document.getElementById("video").srcObject = stream;
    document.getElementById("video-wrap").style.display = "block";
    document.getElementById("cam-btn").className = "cam-btn active";
    document.getElementById("cam-btn").textContent = "⏹ Stop Camera";
  } catch { showStatus("Camera access denied.", "err"); }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById("video-wrap").style.display = "none";
  document.getElementById("cam-btn").className = "cam-btn";
  document.getElementById("cam-btn").innerHTML = "📹 Use Live Camera";
}

function capturePhoto() {
  const v = document.getElementById("video");
  const c = document.getElementById("canvas");
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext("2d").drawImage(v, 0, 0);
  const data = c.toDataURL("image/jpeg", 0.92).split(",")[1];
  imgBase64 = data;
  document.getElementById("preview-img").src = "data:image/jpeg;base64," + data;
  document.getElementById("upload-area").style.display = "none";
  document.getElementById("preview-area").style.display = "block";
  document.getElementById("scan-btn").className = "scan-btn ready";
  stopCamera();
}

async function scanTicket() {
  if (!imgBase64) { showStatus("Please add a ticket photo first.", "err"); return; }
  const btn = document.getElementById("scan-btn");
  btn.className = "scan-btn";
  btn.innerHTML = '<span class="spinner"></span> Reading Ticket…';
  showStatus("Contacting server...", "ok");
  try {
    try { await fetch("/", { signal: AbortSignal.timeout(8000) }); } catch {}
    const res = await fetch("/scan", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ imageBase64: imgBase64, mimeType: "image/jpeg" })
    });
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch { throw new Error("Server error: " + text.substring(0,100)); }
    if (data.error) throw new Error(data.error);
    clearStatus();
    populateForm(data);
  } catch(e) {
    showStatus(e.message || "Scan failed.", "err");
  } finally {
    btn.className = "scan-btn ready";
    btn.innerHTML = "⚡ Extract Ticket Info";
  }
}

function populateForm(d) {
  document.getElementById("f-name").value = d.guestName || "";
  document.getElementById("f-make").value = d.make || "";
  document.getElementById("f-model").value = d.model || "";
  document.getElementById("f-color").value = d.color || "";
  document.getElementById("f-plate").value = (d.licensePlate || "").toUpperCase();
  document.getElementById("f-ticket").value = d.ticketNumber || "";
  document.getElementById("f-location").value = d.location || "";
  document.getElementById("f-notes").value = d.notes || "";
  const now = new Date();
  const dateStr = now.toLocaleDateString([], {month:"2-digit",day:"2-digit",year:"numeric"});
  const timeStr = now.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  document.getElementById("f-timein").value = dateStr + " " + timeStr;
  document.getElementById("form-ticket-num").textContent = d.ticketNumber ? "#" + d.ticketNumber : "";
  document.getElementById("form-card").style.display = "block";
  document.getElementById("form-card").scrollIntoView({ behavior:"smooth" });
}

function discardForm() {
  document.getElementById("form-card").style.display = "none";
  clearImage();
}

function saveTicket() {
  const t = {
    ticketNumber: document.getElementById("f-ticket").value,
    guestName: document.getElementById("f-name").value,
    make: document.getElementById("f-make").value,
    model: document.getElementById("f-model").value,
    color: document.getElementById("f-color").value,
    licensePlate: document.getElementById("f-plate").value.toUpperCase(),
    location: document.getElementById("f-location").value,
    timeIn: document.getElementById("f-timein").value,
    notes: document.getElementById("f-notes").value,
    at: new Date().toLocaleTimeString()
  };
  tickets.unshift(t);
  updateBadge();
  renderLog();
  document.getElementById("form-card").style.display = "none";
  clearImage();
  showStatus("Ticket #" + (t.ticketNumber || "—") + " saved.", "ok");
}

function updateBadge() {
  document.getElementById("badge").textContent = tickets.length + (tickets.length === 1 ? " ticket" : " tickets");
}

function updateLocationFilter() {
  const sel = document.getElementById("filter-location");
  const current = sel.value;
  const locs = [...new Set(tickets.map(t => t.location).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All Locations</option>' + locs.map(l => `<option>${l}</option>`).join("");
  if (locs.includes(current)) sel.value = current;
}

function updateDateFilter() {
  const sel = document.getElementById("filter-date");
  const current = sel.value;
  const dates = [...new Set(tickets.map(t => t.timeIn ? t.timeIn.split(" ")[0] : "").filter(Boolean))].sort().reverse();
  sel.innerHTML = '<option value="">All Dates</option>' + dates.map(d => `<option>${d}</option>`).join("");
  if (dates.includes(current)) sel.value = current;
}

function resetFilters() {
  document.getElementById("filter-make").value = "";
  document.getElementById("filter-color").value = "";
  document.getElementById("filter-location").value = "";
  document.getElementById("filter-date").value = "";
  document.getElementById("sort-by").value = "newest";
  document.getElementById("search-input").value = "";
  renderLog();
}

function renderLog() {
  const log = document.getElementById("log-card");
  const rows = document.getElementById("log-rows");
  if (tickets.length === 0) { log.style.display = "none"; return; }
  log.style.display = "block";
  updateLocationFilter();
  updateDateFilter();

  const q = (document.getElementById("search-input")?.value || "").toLowerCase();
  const fMake = document.getElementById("filter-make")?.value || "";
  const fColor = document.getElementById("filter-color")?.value || "";
  const fLocation = document.getElementById("filter-location")?.value || "";
  const fDate = document.getElementById("filter-date")?.value || "";
  const sortBy = document.getElementById("sort-by")?.value || "newest";

  let filtered = tickets.filter(t => {
    const matchSearch = !q || [t.guestName,t.licensePlate,t.make,t.model,t.ticketNumber,t.color,t.location].some(v => (v||"").toLowerCase().includes(q));
    const matchMake = !fMake || t.make === fMake;
    const matchColor = !fColor || t.color === fColor;
    const matchLocation = !fLocation || t.location === fLocation;
    const matchDate = !fDate || (t.timeIn||"").startsWith(fDate);
    return matchSearch && matchMake && matchColor && matchLocation && matchDate;
  });

  filtered = [...filtered].sort((a, b) => {
    if (sortBy === "oldest") return tickets.indexOf(b) - tickets.indexOf(a);
    if (sortBy === "name") return (a.guestName||"").localeCompare(b.guestName||"");
    if (sortBy === "ticket") return (a.ticketNumber||"").localeCompare(b.ticketNumber||"");
    return tickets.indexOf(a) - tickets.indexOf(b);
  });

  document.getElementById("log-title").textContent = (q||fMake||fColor||fLocation||fDate)
    ? filtered.length + " of " + tickets.length + " tickets"
    : "Ticket Log — " + tickets.length + " total";

  rows.innerHTML = filtered.map(t => {
    const i = tickets.indexOf(t);
    return `<div class="ticket-row" onclick="openModal(${i})">
      <span class="ticket-num-col">#${t.ticketNumber||"—"}</span>
      <div class="ticket-info">
        <div class="ticket-main">${t.guestName||"Guest"} · ${[t.make,t.model].filter(Boolean).join(" ")||"Unknown"}</div>
        <div class="ticket-sub">${t.licensePlate||"No plate"} · ${t.color||"—"} · ${t.timeIn||t.at}</div>
      </div>
      <div class="color-dot" style="background:${COLOR_MAP[t.color]||"#444"}"></div>
      <button class="del-btn" onclick="event.stopPropagation();deleteTicket(${i})">✕</button>
    </div>`;
  }).join("");
}

function deleteTicket(i) {
  tickets.splice(i, 1);
  updateBadge();
  renderLog();
}

function exportCSV() {
  const h = ["Ticket #","Guest","Make","Model","Color","Plate","Location","Date & Time In","Notes","Saved"];
  const rows = tickets.map(t =>
    [t.ticketNumber,t.guestName,t.make,t.model,t.color,t.licensePlate,t.location,t.timeIn,t.notes,t.at]
      .map(v => '"' + (v||"").replace(/"/g,'""') + '"').join(",")
  );
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([[h.join(","),...rows].join("\n")],{type:"text/csv"}));
  a.download = "valet-" + new Date().toLocaleDateString().replace(/\//g,"-") + ".csv";
  a.click();
}

function openModal(i) {
  modalIndex = i;
  const t = tickets[i];
  document.getElementById("modal-title").textContent = "Ticket #" + (t.ticketNumber||"—");
  document.getElementById("m-name").value = t.guestName||"";
  document.getElementById("m-make").value = t.make||"";
  document.getElementById("m-model").value = t.model||"";
  document.getElementById("m-color").value = t.color||"";
  document.getElementById("m-plate").value = t.licensePlate||"";
  document.getElementById("m-ticket").value = t.ticketNumber||"";
  document.getElementById("m-location").value = t.location||"";
  document.getElementById("m-timein").value = t.timeIn||"";
  document.getElementById("m-notes").value = t.notes||"";
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
  modalIndex = -1;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
}

function saveModal() {
  if (modalIndex === -1) return;
  tickets[modalIndex] = {
    ...tickets[modalIndex],
    guestName: document.getElementById("m-name").value,
    make: document.getElementById("m-make").value,
    model: document.getElementById("m-model").value,
    color: document.getElementById("m-color").value,
    licensePlate: document.getElementById("m-plate").value.toUpperCase(),
    ticketNumber: document.getElementById("m-ticket").value,
    location: document.getElementById("m-location").value,
    notes: document.getElementById("m-notes").value,
  };
  closeModal();
  updateBadge();
  renderLog();
  showStatus("Ticket updated.", "ok");
}
</script>
